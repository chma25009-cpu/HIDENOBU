<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Personal Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      line-height: 1.6;
      background: #fafafa;
      color: #111;
    }

    header {
      background: #111;
      color: white;
      padding: 60px 20px;
      text-align: center;
    }

    section {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    h2 {
      border-left: 5px solid #111;
      padding-left: 10px;
    }

    .timeline {
      border-left: 2px solid #ccc;
      padding-left: 20px;
    }

    .item {
      margin-bottom: 20px;
    }

    .quiz-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      border: none;
      background: #111;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .result {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>
  <img src="image/顔.png" alt="宣材写真" style="width:120px;height:120px;object-fit:cover;border-radius:50%;margin-bottom:20px;" />
  <h1>HIDENOBU</h1>
  <p>孤高の男</p>
</header>

<section>
  <h2>自己紹介</h2>
  <p>
    毎日がeveryday
  </p>
</section>

<section>
  <h2>経歴</h2>
  <div class="timeline">
    <div class="item">2024 - フリーダムフォレスト　入学</div>
    <div class="item">2025 - アルバイト　開始</div>
    <div class="item">2026 - 第一種自動車運転免許　取得</div>
  </div>
</section>

<section>
  <h2>付録クイズ</h2>
  <div class="quiz-box">
    <p>Q. HIDENOBUが好きな女性アニメチャラは？</p>
    <button onclick="checkAnswer('a')">A. 綱手（NARUTO）</button>
    <button onclick="checkAnswer('b')">B. レム</button>
    <button onclick="checkAnswer('c')">C. マキマ</button>
    <div class="result" id="result"></div>
  </div>
</section>

<script>
  function checkAnswer(ans) {
    const result = document.getElementById('result');
    if(ans === 'a') {
      result.textContent = '正解！';
      result.style.color = 'green';
    } else {
      result.textContent = '不正解。もう一度考えてみよう。';
      result.style.color = 'red';
    }
  }
</script>
<section>
  <h2>UFOキャッチャーゲーム</h2>

  <canvas id="game" width="300" height="300"
    style="border:1px solid #ccc; background:#fff; display:block; margin:0 auto;">
  </canvas>

  <p style="text-align:center;">
    タップ / クリックで掴む・離す
  </p>
</section>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// --- プレイヤー（クレーン） ---
let tx = 150, ty = 150;
let held = null;
let score = 0;

// --- かご ---
const basket = {x: 250, y: 250, r: 25};

// --- 景品 ---
let prizes = [];
for (let i = 0; i < 10; i++) {
  prizes.push({
    x: Math.random() * 260 + 20,
    y: Math.random() * 260 + 20,
    state: "free"
  });
}

// --- マウス / タッチ移動 ---
function move(e) {
  const rect = canvas.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
  tx = x;
  ty = y;
}

canvas.addEventListener("mousemove", move);
canvas.addEventListener("touchmove", move);

// --- クリック（掴む / 離す） ---
canvas.addEventListener("mousedown", grabOrRelease);
canvas.addEventListener("touchstart", grabOrRelease);

function grabOrRelease() {
  if (held === null) {
    for (let i = 0; i < prizes.length; i++) {
      let p = prizes[i];
      let d = Math.hypot(tx - p.x, ty - p.y);
      if (p.state === "free" && d < 20) {
        p.state = "held";
        held = i;
        break;
      }
    }
  } else {
    prizes[held].state = "free";
    held = null;
  }
}

// --- 描画 ---
function draw() {
  ctx.clearRect(0, 0, 300, 300);

  // かご
  ctx.beginPath();
  ctx.arc(basket.x, basket.y, basket.r, 0, Math.PI * 2);
  ctx.stroke();

  ctx.fillText("SCORE: " + score, 10, 20);

  // クレーン
  ctx.fillRect(tx - 5, ty - 5, 10, 10);

  // 景品
  prizes.forEach(p => {

    // 掴んでるなら追従
    if (p.state === "held") {
      p.x = tx;
      p.y = ty;

      // ゴール判定
      let d = Math.hypot(p.x - basket.x, p.y - basket.y);
      if (d < basket.r) {
        p.state = "delivered";
        held = null;
        score++;

        // 新規追加
        prizes.push({
          x: Math.random() * 260 + 20,
          y: Math.random() * 260 + 20,
          state: "free"
        });
      }
    }

    // 描画
    ctx.beginPath();
    ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);

    if (p.state === "delivered") {
      ctx.fillStyle = "gray";
    } else {
      ctx.fillStyle = "black";
    }

    ctx.fill();
  });

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
