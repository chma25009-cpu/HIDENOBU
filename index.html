<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Personal Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      line-height: 1.6;
      background: #fafafa;
      color: #111;
    }

    header {
      background: #111;
      color: white;
      padding: 60px 20px;
      text-align: center;
    }

    section {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    h2 {
      border-left: 5px solid #111;
      padding-left: 10px;
    }

    .timeline {
      border-left: 2px solid #ccc;
      padding-left: 20px;
    }

    .item {
      margin-bottom: 20px;
    }

    .quiz-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      border: none;
      background: #111;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .result {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>
  <img src="image/顔.png" alt="宣材写真" style="width:120px;height:120px;object-fit:cover;border-radius:50%;margin-bottom:20px;" />
  <h1>HIDENOBU</h1>
  <p>孤高の男</p>
</header>

<section>
  <h2>自己紹介</h2>
  <p>
    毎日がeveryday
  </p>
</section>

<section>
  <h2>経歴</h2>
  <div class="timeline">
    <div class="item">2024 - フリーダムフォレスト　入学</div>
    <div class="item">2025 - アルバイト　開始</div>
    <div class="item">2026 - 第一種自動車運転免許　取得</div>
  </div>
</section>

<section>
  <h2>付録クイズ</h2>
  <div class="quiz-box">
    <p>Q. HIDENOBUが好きな女性アニメチャラは？</p>
    <button onclick="checkAnswer('a')">A. 綱手（NARUTO）</button>
    <button onclick="checkAnswer('b')">B. レム</button>
    <button onclick="checkAnswer('c')">C. マキマ</button>
    <div class="result" id="result"></div>
  </div>
</section>

<script>
  function checkAnswer(ans) {
    const result = document.getElementById('result');
    if(ans === 'a') {
      result.textContent = '正解！';
      result.style.color = 'green';
    } else {
      result.textContent = '不正解。もう一度考えてみよう。';
      result.style.color = 'red';
    }
  }
</script>

</body>
</html>
